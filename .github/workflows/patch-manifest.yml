name: Build Patch Manifest

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  manifest:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: py -m pip install -r requirements.txt
      - name: Build app
        run: py -m PyInstaller --clean --noconfirm StankyTools.spec
      - name: Build manifest
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          py -m stanky_market.updater2.manifest_builder --root dist/StankyTools --base-url "https://github.com/TheStankylegTools/StankyTools/releases/download/${{ github.ref_name }}" --version $version --out dist/StankyTools/manifest.json
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StankyTools-patch-manifest
          path: dist/StankyTools/manifest.json
