name: Build and Publish Public Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout private source
        uses: actions/checkout@v4

      - name: Set version
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV
          echo "VERSION_NUMBER=$($version.TrimStart('v'))" >> $env:GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }
          pip install pyinstaller

      - name: Syntax check
        shell: pwsh
        run: |
          python -m py_compile main.py
          python -m py_compile stanky_market/app.py
          python -m py_compile stanky_market/db.py

      - name: Build app
        shell: pwsh
        run: |
          if (Test-Path StankyTools.spec) {
            pyinstaller --clean --noconfirm StankyTools.spec
          } else {
            pyinstaller --clean --noconfirm --windowed --name StankyTools main.py
          }

      - name: Create portable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/StankyTools/*" -DestinationPath "StankyTools-Portable-${env:APP_VERSION}.zip" -Force

      - name: Rename installer if present
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path . -Recurse -Include "*.exe" | Where-Object { $_.FullName -notlike "*\dist\StankyTools\*" } | Select-Object -First 1
          if ($installer) {
            Copy-Item $installer.FullName "StankyTools-Setup-${env:APP_VERSION}.exe" -Force
          }

      - name: Publish to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: TheStankylegTools/StankyTools-Releases
          token: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          tag_name: ${{ env.APP_VERSION }}
          name: StankyTools ${{ env.APP_VERSION }}
          draft: false
          prerelease: false
          files: |
            StankyTools-Portable-${{ env.APP_VERSION }}.zip
            StankyTools-Setup-${{ env.APP_VERSION }}.exe
          fail_on_unmatched_files: false