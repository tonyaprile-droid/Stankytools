name: Build StankyTools

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Clean local runtime cache before packaging
        shell: pwsh
        run: |
          Remove-Item -Force -ErrorAction SilentlyContinue data\stanky_market.sqlite3
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue __pycache__, stanky_market\__pycache__, build, dist

      - name: Build Windows portable app
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm StankyTools.spec

      - name: Show release size report
        shell: pwsh
        run: |
          python tools\analyze_release_size.py dist\StankyTools

      - name: Package portable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path dist\StankyTools\* -DestinationPath StankyTools-Windows.zip -Force
          Get-Item StankyTools-Windows.zip | Select-Object Name,Length

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: StankyTools-Windows
          path: StankyTools-Windows.zip

      - name: Publish GitHub Release for version tags
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: StankyTools-Windows.zip
