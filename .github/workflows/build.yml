name: Build StankyTools

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Clean local runtime cache before packaging
        shell: pwsh
        run: |
          Remove-Item -Force -ErrorAction SilentlyContinue data\stanky_market.sqlite3
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue __pycache__, stanky_market\__pycache__, build, dist

      - name: Build Windows portable app
        shell: pwsh
        run: python -m PyInstaller --clean --noconfirm StankyTools.spec

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $tag = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "dev" }
          $name = "StankyTools-Portable-$tag.zip"
          Compress-Archive -Path dist\StankyTools\* -DestinationPath $name -Force
          "PACKAGE_NAME=$name" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: StankyTools-Portable
          path: ${{ env.PACKAGE_NAME }}

      - name: Publish public release asset for version tags
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          repository: StankylegTools/StankyTools-Releases
          tag_name: ${{ github.ref_name }}
          name: StankyTools ${{ github.ref_name }}
          body: |
            Download the Windows portable package below.

            This releases-only repository does not contain the private StankyTools source code.
          files: ${{ env.PACKAGE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_RELEASES_TOKEN }}

